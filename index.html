<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindy 多益口說訓練</title>
    
    <link rel="icon" type="image/jpeg" href="mibi_listen.jpg">
    <link rel="apple-touch-icon" href="mibi_listen.jpg">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; color: #333; }
        .card { background: white; padding: 30px 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; position: relative; } 
        h2 { margin: 0 0 15px 0; color: #2c3e50; font-size: 1.5em; line-height: 1.4; }
        .rules-box { background: #f0f8ff; color: #2c3e50; padding: 15px 20px; border-radius: 12px; font-size: 0.95em; margin-bottom: 20px; border: 1px solid #d6eaff; text-align: left; line-height: 1.7; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .rules-box b { color: #0984e3; }
        .rules-list { margin: 5px 0 0 20px; padding: 0; }
        .rules-list li { margin-bottom: 5px; }
        .stats-container { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; }
        .stat-badge { padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9em; display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); }
        .streak-badge { background: #ffeaa7; color: #d35400; }
        .avg-badge { background: #74b9ff; color: #0984e3; }
        .mission-bar-wrapper { width: 100%; overflow-x: auto; padding: 5px 0 15px 0; margin-bottom: 10px; -webkit-overflow-scrolling: touch; mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent); }
        .mission-bar { display: flex; gap: 12px; width: max-content; margin: 0 auto; padding: 0 15px; }
        .mission-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 75px; height: 95px; background: #f1f2f6; border-radius: 12px; color: #bdc3c7; font-size: 0.8em; transition: 0.3s; position: relative; cursor: pointer; border: 2px solid transparent; }
        .mission-icon { font-size: 2em; margin-bottom: 5px; filter: grayscale(100%); opacity: 0.5; transition: 0.3s; }
        .mission-text { font-weight: bold; margin-bottom: 3px; }
        .mission-item.active { border-color: #3498db; transform: scale(1.08); z-index: 2; box-shadow: 0 5px 15px rgba(52, 152, 219, 0.25); background: #fff; color: #3498db; }
        .mission-item.active .mission-icon { filter: none; opacity: 1; }
        .mission-item.in-progress { background: #e3f2fd; color: #3498db; border: 2px solid #abcdff; }
        .mission-item.in-progress .mission-icon { filter: none; opacity: 0.8; }
        .mission-item.mastered { background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%); color: white; border: none; box-shadow: 0 4px 8px rgba(243, 156, 18, 0.3); }
        .mission-item.mastered .mission-icon { filter: none; opacity: 1; text-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .target-sentence { font-size: 1.3em; font-weight: bold; color: #2c3e50; margin: 10px 0; padding: 20px; background: #eef2f3; border-radius: 10px; min-height: 80px; display: flex; align-items: center; justify-content: center; line-height: 1.4; }
        .listen-area { margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 12px; border: 1px solid #eee; }
        .btn-flag { background: white; border: 1px solid #ddd; padding: 5px 12px; border-radius: 30px; font-size: 0.9rem; cursor: pointer; margin: 0 3px; }
        .speed-control { margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.85em; color: #555; }
        .record-section { border-top: 2px dashed #eee; padding-top: 20px; margin-top: 15px; }
        .btn-mic { background-color: #ff4757; color: white; border: none; padding: 15px 30px; font-size: 1.1em; border-radius: 50px; cursor: pointer; margin: 10px auto; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); display: flex; align-items: center; justify-content: center; gap: 10px; width: 80%; }
        .btn-mic.listening { background-color: #2ed573; animation: pulse 1.5s infinite; }
        .result-box { margin-top: 20px; text-align: left; line-height: 1.6; font-size: 1.1em; }
        .correct { color: #2ed573; font-weight: bold; }
        .wrong { color: #ff4757; text-decoration: line-through; margin-right: 5px; opacity: 0.7; }
        .correction { color: #2ed573; font-weight: bold; text-decoration: underline; }
        .score-container { display: none; margin-top: 20px; min-height: 140px; }
        .score-circle, #result-mibi { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 10px auto; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .score-circle { display: flex; align-items: center; justify-content: center; font-size: 2.2em; font-weight: bold; color: white; border: 5px solid rgba(255,255,255,0.3); }
        #result-mibi { border: 4px solid #fff; object-fit: cover; display: none; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .score-text { font-size: 1.1em; font-weight: bold; margin-bottom: 5px; min-height: 1.2em; }
        .btn-next { background: #3742fa; color: white; border: none; padding: 12px 25px; border-radius: 8px; margin-top: 20px; cursor: pointer; font-size: 1em; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 80%; max-width: 350px; }
        .login-input { padding: 10px; width: 80%; font-size: 1.2em; margin: 20px 0; border: 2px solid #ddd; border-radius: 5px; text-align: center; }
        .btn-login { background: #2ed573; color: white; border: none; padding: 10px 30px; font-size: 1.1em; border-radius: 50px; cursor: pointer; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(46, 213, 115, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0); } }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="margin:0;">🔒 VIP 會員專區</h2>
        <p style="color:#666; margin-top:10px;">請輸入本期通行碼</p>
        <input type="text" id="passcode" class="login-input" placeholder="輸入密碼">
        <br>
        <button class="btn-login" onclick="checkLogin()">解鎖進入</button>
        <p id="error-msg" style="color:red; display:none; margin-top:10px;">密碼錯誤</p>
    </div>
</div>

<div class="card" id="main-content" style="filter:blur(10px); pointer-events:none;">
    <div style="display: flex; justify-content: center; margin-bottom: 15px;">
        <img id="top-mibi-img" src="mibi_listen.jpg" style="width: 110px; height: 110px; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.15); object-fit: cover; background-color: #eee;" alt="Mibi">
    </div>
    <h2>Mindy 多益｜陪你從聽懂，到說得出來</h2>
    <div class="rules-box">
        <b>Mibi 陪你練口說！</b>
        <ul class="rules-list">
            <li><b>挑戰關卡</b>：聽完例句，按住錄音模仿語調。</li>
            <li><b>累積經驗</b>：練習過的關卡會變成 <span style="background:#e3f2fd; color:#3498db; padding:2px 5px; border-radius:5px;">🔵 淺藍色</span>。</li>
            <li><b>贏得榮耀</b>：累積 <b>2 次滿分</b>，勳章就會變成 <span style="background:linear-gradient(135deg, #f1c40f, #f39c12); color:white; padding:2px 5px; border-radius:5px;">🏆 金色</span>！</li>
        </ul>
    </div>
    <div class="stats-container">
        <div class="stat-badge streak-badge">🔥 連續 <span id="streak-count">1</span> 天</div>
        <div class="stat-badge avg-badge">📈 平均 <span id="avg-score">--</span> 分</div>
    </div>
    <div class="mission-bar-wrapper">
        <div id="mission-bar" class="mission-bar"></div>
    </div>
    <div id="target" class="target-sentence">Loading...</div>
    <div class="listen-area">
        <div>
            <button class="btn-flag" onclick="speakWithAccent('en-US')">🇺🇸 美式</button>
            <button class="btn-flag" onclick="speakWithAccent('en-GB')">🇬🇧 英式</button>
            <button class="btn-flag" onclick="speakWithAccent('en-AU')">🇦🇺 澳洲</button>
        </div>
        <div class="speed-control">
            🐢 慢
            <input type="range" id="rate-slider" min="0.5" max="1.5" step="0.1" value="0.9" oninput="updateSpeedLabel(this.value)">
            快 🐰 <span id="rate-label">(0.9x)</span>
        </div>
    </div>
    <div class="record-section">
        <p style="margin-bottom:5px; font-weight:bold; color:#555;">現在換你唸唸看：</p>
        <select id="rec-accent" style="margin-bottom:10px; padding:5px; border-radius:5px;">
            <option value="en-US">評分標準：🇺🇸 美式</option>
            <option value="en-GB">評分標準：🇬🇧 英式</option>
            <option value="en-AU">評分標準：🇦🇺 澳洲</option>
        </select>
        <button id="btn-mic" class="btn-mic" onclick="toggleListening()">🎙️ 按住開始錄音</button>
        <div id="score-box" class="score-container">
            <div id="score-text" class="score-text"></div>
            <div id="score-circle" class="score-circle">--</div>
            <img id="result-mibi" src="mibi_listen.jpg">
        </div>
        <div id="result" class="result-box"></div>
    </div>
    <button class="btn-next" onclick="nextQuestion()">👉 下一題</button>
</div>
